<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>login</title>
    <link href="/src/style.css" rel="stylesheet" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
  </head>
  <body class="bgimage">
    <main class="flex justify-center items-center px-4 py-6">
      <div
        class="relative flex flex-col lg:flex-row justify-start items-center lg:items-start colornav w-full max-w-5xl lg:w-200 h-auto lg:h-150 my-6 lg:my-10 p-4 sm:p-6 lg:p-4 rounded-2xl"
      >
        <div class="mb-6 lg:mb-0 lg:mr-20 w-full sm:w-72 lg:w-auto mx-auto lg:mx-0">
          <img
            src="/src/assets/photo/p6.jpg"
            class="w-full h-56 sm:h-72 lg:w-90 lg:h-142 object-cover rounded-2xl"
            alt=""
          />
        </div>
        <div class="flex flex-col justify-start items-start w-full sm:w-auto sm:mx-auto lg:mx-0 lg:w-auto px-2 sm:px-0">
          <div class="mt-0 lg:mt-15">
            <h1 class="text-4xl mb-3">Welcome Back</h1>
            <p class="text-[14px]">Your morning ritual is just a click away.</p>
          </div>
          <div class="mt-5 w-full">
            <div>
              <h1 class="ml-3">Username</h1>
              <div class="">
                <input
                  id="username"
                  type="text"
                  placeholder="example@gmail.com"
                  class="border-2 rounded-2xl pl-4 w-full sm:w-60 h-8"
                />
              </div>
            </div>
            <div class="mt-4">
              <h1 class="ml-3">Password</h1>
              <div>
                <input
                  id="password"
                  type="password"
                  placeholder="sfiww@ico$#"
                  class="border-2 rounded-2xl pl-4 w-full sm:w-60 h-8"
                />
              </div>
            </div>
            <div class="mt-2">
              <div class="flex items-center justify-between w-full text-[12px]">
                <label
                  class="flex items-center space-x-2 cursor-pointer select-none"
                >
                  <input
                    type="checkbox"
                    class="w-4 h-4 rounded-full appearance-none bg-[#f8dcd1] checked:bg-[#8B4513] focus:outline-none transition duration-200"
                  />
                  <span class="">Remember me</span>
                </label>
                <a href="#" class="text-[#8B4513] hover:underline font-medium">
                  Forgot Peassword?
                </a>
              </div>
            </div>
            <div class="mt-2">
              <p id="loginError" class="hidden text-red-600 text-[12px]"></p>
            </div>
            <div class="mt-5 blown text-center rounded-2xl">
              <button
                id="loginBtn"
                type="button"
                class="color4 py-1 px-20 rounded-2xl text-white cursor-pointer"
              >
                Log In
              </button>
            </div>
            <div class="mt-3">
              <h6 class="text-[13px] text-center">Or continue with</h6>
            </div>
            <div class="flex flex-row justify-center items-center gap-5 mt-4">
              <img
                src="/src/assets/photo/facebook.png"
                class="w-8 h-8"
                alt="facebook"
              />
              <img
                src="/src/assets/photo/instagram.png"
                class="w-8 h-8"
                alt="instagram"
              />
              <img
                src="/src/assets/photo/google.png"
                class="w-8 h-8"
                alt="google"
              />
              <img src="/src/assets/photo/x.png" class="w-8 h-8" alt="x" />
            </div>
            <div class="flex flex-row justify-center items-center mt-5 gap-1">
              <h6 class="text-[13px]">Don't have an account?</h6>
              <a href="/src/pages/signup.html" class="text-[13px]">Join the ritual</a>
            </div>
            <div class="text-center mt-15 border-b-1">
              <a href="/index.html" class="text-[13px]">Back Page</a>
            </div>
          </div>
        </div>
        <div class="absolute top-4 right-4">
          <div class="border-2 rounded-2xl bg-amber-600 px-2">
            <a href="/src/pages/signup.html" class="text-white"
              >Sign Up</a
            >
          </div>
        </div>
      </div>
    </main>
    <script type="module" src="/src/js/user.js"></script>
  </body>
</html>
