<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sign Up</title>
    <link href="/src/style.css" rel="stylesheet" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
  </head>
  <body class="bgimage">
    <main class="flex justify-center items-center px-4 py-6">
      <div
        class="relative flex flex-col lg:flex-row justify-start items-center lg:items-start colornav w-full max-w-5xl lg:w-200 h-auto lg:h-150 my-6 lg:my-10 p-4 sm:p-6 lg:p-4 rounded-2xl"
      >
        <div
          class="mb-6 lg:mb-0 lg:mr-20 relative w-full sm:w-80 lg:max-w-sm mx-auto lg:mx-0 overflow-hidden rounded-2xl shadow-lg flex flex-col"
        >
          <img
            src="/src/assets/photo/p7.jpg"
            class="w-full h-48 sm:h-64 lg:h-88 object-cover"
            alt="Better together"
          />
          <div class="blown p-6 sm:p-8 text-white flex flex-col justify-end">
            <h1 class="text-3xl sm:text-4xl font-bold mb-4 leading-tight">
              Better <br />
              together.
            </h1>
            <p class="text-sm text-gray-300 leading-relaxed">
              Join our community and earn rewards with <br />
              every cozy cup you sip.
            </p>
          </div>
        </div>
        <div class="flex flex-col justify-start items-start w-full sm:w-auto sm:mx-auto lg:mx-0 lg:w-auto px-2 sm:px-0">
          <div class="mt-0 lg:mt-15">
            <h1 class="text-4xl">Start your ritual.</h1>
            <p class="text-[14px]">Create your GenZ Coffee account today.</p>
          </div>
          <div class="mt-5 w-full">
            <div>
              <h1 class="ml-3">Full Name</h1>
              <div class="">
                <input
                  id="fullname"
                  type="text"
                  placeholder="Your Name"
                  class="border-2 rounded-2xl pl-4 w-full sm:w-55 h-8"
                />
              </div>
            </div>
            <div class="mt-4">
              <h1 class="ml-3">Email Address</h1>
              <div class="">
                <input
                  id="email"
                  type="email"
                  placeholder="example@gmail.com"
                  class="border-2 rounded-2xl pl-4 w-full sm:w-55 h-8"
                />
              </div>
            </div>
            <div class="mt-4">
              <h1 class="ml-3">Password</h1>
              <div>
                <input
                  id="password"
                  type="password"
                  placeholder="sfiww@ico$#"
                  class="border-2 rounded-2xl pl-4 w-full sm:w-55 h-8"
                />
              </div>
            </div>
            <div class="mt-2">
              <div class="flex items-center justify-between w-full text-[12px]">
                <label
                  class="flex items-center space-x-2 cursor-pointer select-none"
                >
                  <input
                    type="checkbox"
                    class="w-4 h-4 rounded-full appearance-none bg-[#f8dcd1] checked:bg-[#8B4513] focus:outline-none transition duration-200"
                  />
                  <span class="">Remember me</span>
                </label>
                <a href="#" class="text-[#8B4513] hover:underline font-medium">
                  Forgot Peassword?
                </a>
              </div>
            </div>
            <div class="mt-2">
              <p id="signupError" class="hidden text-red-600 text-[12px]"></p>
            </div>
            <div class="mt-5 blown text-center rounded-2xl">
              <button
                id="createBtn"
                type="button"
                class="color4 py-1 px-20 rounded-2xl text-white cursor-pointer"
              >
                Create Account
              </button>
            </div>
            <div class="flex flex-row justify-center items-center mt-5 gap-1">
              <h6 class="text-[13px]">Already have an account?</h6>
              <a href="/src/pages/login.html" class="text-[13px]">Log In</a>
            </div>
          </div>
        </div>
        <div class="absolute top-4 right-4">
          <div class="border-2 rounded-2xl bg-amber-600 px-2">
            <a href="/src/pages/login.html" class="text-white"
              >Log In</a
            >
          </div>
        </div>
      </div>
    </main>
    <script type="module" src="/src/js/user.js"></script>
  </body>
</html>
